<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPS Calculator Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="shortcut icon" type="image/x-icon" href="https://i.imgur.com/3OYhmFz.png" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root { --primary: #3b82f6; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background 0.3s; }
        
        .accent-bg { background-color: var(--primary); }
        .accent-text { color: var(--primary); }
        .accent-ring { --tw-ring-color: var(--primary); }
        input[type="range"] { accent-color: var(--primary); }

        /* Expanding Animation */
        #themeDrawer {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            max-width: 0;
            opacity: 0;
            overflow: hidden;
        }
        #themeDrawer.expanded {
            max-width: 300px;
            opacity: 1;
            margin-left: 12px;
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: {} }
        }
    </script>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen">

<div class="max-w-6xl mx-auto p-4 md:p-8">
    
    <!-- TOP NAVIGATION -->
    <header class="flex flex-wrap justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-extrabold tracking-tight">NPS Calculator</h1>
            <p class="text-slate-500 dark:text-slate-400 font-medium">Modern Retirement Planning</p>
        </div>

        <div class="flex items-center gap-3">
            <!-- Expanding Color Theme Picker -->
            <div class="flex items-center bg-white dark:bg-slate-900 p-2 rounded-full shadow-lg border border-slate-200 dark:border-slate-800">
                <button onclick="toggleThemeDrawer()" class="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 hover:scale-105 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 accent-text" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01" />
                    </svg>
                </button>
                <div id="themeDrawer" class="flex gap-2">
                    <button onclick="setAccent('#3b82f6')" class="w-6 h-6 rounded-full bg-blue-500"></button>
                    <button onclick="setAccent('#8b5cf6')" class="w-6 h-6 rounded-full bg-violet-500"></button>
                    <button onclick="setAccent('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500"></button>
                    <button onclick="setAccent('#f43f5e')" class="w-6 h-6 rounded-full bg-rose-500"></button>
                    <button onclick="setAccent('#f59e0b')" class="w-6 h-6 rounded-full bg-amber-500"></button>
                </div>
            </div>

            <!-- Dark Mode Toggle -->
            <button onclick="toggleDarkMode()" class="w-12 h-12 flex items-center justify-center rounded-full bg-white dark:bg-slate-900 shadow-lg border border-slate-200 dark:border-slate-800 text-slate-600 dark:text-amber-400 hover:scale-105 transition-transform">
                <svg id="themeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                </svg>
            </button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- INPUT COLUMN -->
        <div class="lg:col-span-5 space-y-6">
            <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                <h3 class="text-lg font-bold mb-8 flex items-center gap-2">
                    <span class="w-1.5 h-6 accent-bg rounded-full"></span> Investment Details
                </h3>

                <div class="space-y-8">
                    <!-- DOB -->
                    <div>
                        <label class="text-xs font-bold uppercase text-slate-400 tracking-wider block mb-3">Date of Birth</label>
                        <input type="date" id="dob" class="w-full p-4 bg-slate-50 dark:bg-slate-800 rounded-2xl outline-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-600 transition-all">
                    </div>

                    <!-- Ages -->
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-bold text-slate-500">Current Age</label>
                                <input type="number" id="ageBox" class="w-12 text-right font-bold accent-text bg-transparent" value="30">
                            </div>
                            <input type="range" id="ageSlider" min="18" max="65" value="30" class="w-full">
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-bold text-slate-500">Invest Till Age</label>
                                <input type="number" id="untilBox" class="w-12 text-right font-bold accent-text bg-transparent" value="60">
                            </div>
                            <input type="range" id="untilSlider" min="20" max="75" value="60" class="w-full">
                        </div>
                    </div>

                    <!-- Monthly -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Monthly Contribution (₹)</label>
                            <input type="number" id="monthlyBox" class="w-24 text-right font-bold accent-text bg-transparent text-lg" value="10000">
                        </div>
                        <input type="range" id="monthlySlider" min="500" max="150000" step="500" value="10000" class="w-full">
                    </div>

                    <!-- Existing -->
                    <div>
                        <div class="flex justify-between mb-2">
                            <label class="text-xs font-bold text-slate-500 uppercase">Existing Tier-1 Balance (₹)</label>
                            <input type="number" id="existingBox" class="w-32 text-right font-bold accent-text bg-transparent" value="0">
                        </div>
                        <input type="range" id="existingSlider" min="0" max="10000000" step="10000" value="0" class="w-full">
                    </div>

                    <!-- ROI & Annuity ROI -->
                    <div class="grid grid-cols-2 gap-6">
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-bold text-slate-500">Exp. ROI %</label>
                                <input type="number" id="roiBox" step="0.5" class="w-12 text-right font-bold accent-text bg-transparent" value="10">
                            </div>
                            <input type="range" id="roiSlider" min="1" max="15" step="0.5" value="10" class="w-full">
                        </div>
                        <div>
                            <div class="flex justify-between mb-2">
                                <label class="text-xs font-bold text-slate-500">Annuity ROI %</label>
                                <input type="number" id="annRoiBox" step="0.1" class="w-12 text-right font-bold accent-text bg-transparent" value="6">
                            </div>
                            <input type="range" id="annRoiSlider" min="3" max="12" step="0.1" value="6" class="w-full">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- RESULTS COLUMN -->
        <div class="lg:col-span-7 space-y-6">
            
            <!-- Hero Stats -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="accent-bg p-8 rounded-[2rem] text-white shadow-2xl relative overflow-hidden transition-all duration-500" id="pensionCard">
                    <p class="text-white/80 text-sm font-bold uppercase tracking-wider mb-2">Monthly Pension</p>
                    <h2 class="text-5xl font-black mb-1" id="resPension">₹0</h2>
                    <svg class="absolute -right-4 -bottom-4 w-32 h-32 text-white/10" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4a2 2 0 00-2 2v4a2 2 0 002 2V6h10a2 2 0 00-2-2H4zm2 6a2 2 0 012-2h8a2 2 0 012 2v4a2 2 0 01-2 2H8a2 2 0 01-2-2v-4zm6 4a2 2 0 100-4 2 2 0 000 4z"></path></svg>
                </div>
                <div class="bg-white dark:bg-slate-900 p-8 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                    <p class="text-slate-400 dark:text-slate-500 text-sm font-bold uppercase mb-2">Total Corpus</p>
                    <h2 class="text-4xl font-black dark:text-white" id="resCorpus">₹0</h2>
                </div>
            </div>

            <!-- Breakdown -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Invested</p>
                    <p class="text-lg font-bold" id="resInvested">₹0</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Gains</p>
                    <p class="text-lg font-bold text-emerald-500" id="resGains">₹0</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Lumpsum</p>
                    <p class="text-lg font-bold text-orange-500" id="resLumpsum">₹0</p>
                </div>
                <div class="bg-white dark:bg-slate-900 p-5 rounded-3xl border border-slate-100 dark:border-slate-800">
                    <p class="text-[10px] font-bold text-slate-400 uppercase mb-1">Annuity</p>
                    <p class="text-lg font-bold text-violet-500" id="resAnnuity">₹0</p>
                </div>
            </div>

            <!-- Visuals -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                    <p class="text-center font-bold text-slate-400 text-xs uppercase mb-4 tracking-widest">Growth</p>
                    <div class="h-60"><canvas id="barChart"></canvas></div>
                </div>
                <div class="bg-white dark:bg-slate-900 p-6 rounded-[2rem] shadow-xl border border-slate-100 dark:border-slate-800">
                    <p class="text-center font-bold text-slate-400 text-xs uppercase mb-4 tracking-widest">Split</p>
                    <div class="h-60"><canvas id="pieChart"></canvas></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const state = {
        age: 30, until: 60, monthly: 10000, existing: 0, roi: 10, annRoi: 6,
        primary: '#3b82f6', charts: {}
    };

    function toggleDarkMode() {
        const html = document.documentElement;
        const icon = document.getElementById('themeIcon');
        if (html.classList.contains('dark')) {
            html.classList.remove('dark');
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />';
        } else {
            html.classList.add('dark');
            icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 11H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.95 16.95l.707.707M7.05 7.05l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />';
        }
        calculate();
    }

    function toggleThemeDrawer() {
        document.getElementById('themeDrawer').classList.toggle('expanded');
    }

    function setAccent(color) {
        state.primary = color;
        document.documentElement.style.setProperty('--primary', color);
        calculate();
    }

    function init() {
        const sync = (id) => {
            const slider = document.getElementById(id + 'Slider');
            const box = document.getElementById(id + 'Box');
            slider.addEventListener('input', () => { box.value = slider.value; calculate(); });
            box.addEventListener('input', () => { slider.value = box.value; calculate(); });
        };
        ['age', 'until', 'monthly', 'existing', 'roi', 'annRoi'].forEach(sync);

        document.getElementById('dob').addEventListener('change', function() {
            const age = new Date().getFullYear() - new Date(this.value).getFullYear();
            document.getElementById('ageSlider').value = age;
            document.getElementById('ageBox').value = age;
            calculate();
        });
        calculate();
    }

    function format(num) {
        if (num >= 10000000) return "₹" + (num / 10000000).toFixed(2) + " Cr";
        if (num >= 100000) return "₹" + (num / 100000).toFixed(2) + " L";
        return "₹" + new Intl.NumberFormat('en-IN').format(Math.round(num));
    }

    function calculate() {
        const curAge = parseInt(document.getElementById('ageSlider').value);
        const endAge = parseInt(document.getElementById('untilSlider').value);
        const monthly = parseFloat(document.getElementById('monthlySlider').value);
        const existing = parseFloat(document.getElementById('existingSlider').value);
        const roi = parseFloat(document.getElementById('roiSlider').value) / 100;
        const annRoi = parseFloat(document.getElementById('annRoiSlider').value) / 100;

        const years = Math.max(0, endAge - curAge);
        const months = years * 12;
        const r = roi / 12;

        const fvMonthly = months > 0 ? monthly * ((Math.pow(1 + r, months) - 1) / r) * (1 + r) : 0;
        const fvExisting = existing * Math.pow(1 + r, months);
        
        const totalCorpus = fvMonthly + fvExisting;
        const totalInvested = (monthly * months) + existing;
        const totalGains = totalCorpus - totalInvested;
        const annuityAmt = totalCorpus * 0.40; // Standard 40%
        const lumpsumAmt = totalCorpus - annuityAmt;
        const monthlyPension = (annuityAmt * annRoi) / 12;

        document.getElementById('resPension').innerText = format(monthlyPension);
        document.getElementById('resCorpus').innerText = format(totalCorpus);
        document.getElementById('resInvested').innerText = format(totalInvested);
        document.getElementById('resGains').innerText = format(totalGains);
        document.getElementById('resLumpsum').innerText = format(lumpsumAmt);
        document.getElementById('resAnnuity').innerText = format(annuityAmt);

        updateCharts(totalInvested, totalGains, totalCorpus, lumpsumAmt, annuityAmt);
    }

    function updateCharts(invested, gains, total, lumpsum, annuity) {
        const isDark = document.documentElement.classList.contains('dark');
        const textColor = isDark ? '#94a3b8' : '#64748b';

        if (state.charts.bar) state.charts.bar.destroy();
        if (state.charts.pie) state.charts.pie.destroy();

        state.charts.bar = new Chart(document.getElementById('barChart'), {
            type: 'bar',
            data: {
                labels: ['Invested', 'Gains', 'Corpus'],
                datasets: [{
                    data: [invested, gains, total],
                    backgroundColor: ['#94a3b8', state.primary, state.primary + '66'],
                    borderRadius: 12
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    y: { ticks: { color: textColor, callback: v => format(v) }, grid: { display: false } },
                    x: { ticks: { color: textColor }, grid: { display: false } }
                }
            }
        });

        state.charts.pie = new Chart(document.getElementById('pieChart'), {
            type: 'doughnut',
            data: {
                labels: ['Lumpsum', 'Annuity'],
                datasets: [{
                    data: [lumpsum, annuity],
                    backgroundColor: ['#f59e0b', '#8b5cf6'],
                    borderWidth: 0
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, cutout: '75%',
                plugins: { legend: { position: 'bottom', labels: { color: textColor, usePointStyle: true } } }
            }
        });
    }

    init();
</script>
</body>
</html>
